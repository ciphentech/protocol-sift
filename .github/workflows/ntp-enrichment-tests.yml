name: ntp-enrichment-tests

on:
  push:
    paths:
      - 'analysis-scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'analysis-scripts/**'
      - 'requirements.txt'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: bash analysis-scripts/tests/run_acceptance.sh
